services:
  db:
    image: mysql:8.0
    container_name: elearning_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: elearning_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - ./sql/setup.sql:/docker-entrypoint-initdb.d/setup.sql
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  app:
    build: .
    container_name: elearning_app
    restart: always
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: password
      DB_NAME: elearning_db
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin
    container_name: elearning_pma
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: password
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
